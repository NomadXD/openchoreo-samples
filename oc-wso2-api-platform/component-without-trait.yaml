# =============================================================================
# USAGE EXAMPLE (without policies)
# =============================================================================
#
# The following resources demonstrate how to use the api-management trait
# without enabling any policies (jwt-auth, rate limiting, headers).
# The trait still creates the Backend, RestApi, and patches the HTTPRoute
# to route traffic through the WSO2 router — but no policies are applied.
#
# To enable policies, set enabled: true on jwtAuth, rateLimit, or addHeaders.
# See component.yaml for a full example with policies enabled.

# --- Component: Using WSO2 API Platform for API management (no policies) ---
---
apiVersion: openchoreo.dev/v1alpha1
kind: Component
metadata:
  name: greeting-service
  namespace: default
spec:
  owner:
    projectName: default
  autoDeploy: true
  componentType:
    kind: ComponentType
    name: deployment/service

  traits:
    - name: api-management
      instanceName: greeter-api

---
# --- Workload ---
apiVersion: openchoreo.dev/v1alpha1
kind: Workload
metadata:
  name: greeting-service-workload
  namespace: default
spec:
  owner:
    projectName: default
    componentName: greeting-service

  endpoints:
    http:
      type: HTTP
      port: 9090
      visibility: [external]

  container:
    image: "ghcr.io/openchoreo/samples/greeter-service:latest"
    args:
      - --port
      - "9090"

---
# --- ReleaseBinding: Development environment ---
apiVersion: openchoreo.dev/v1alpha1
kind: ReleaseBinding
metadata:
  name: greeting-service-development
  namespace: default
spec:
  owner:
    projectName: default
    componentName: greeting-service

  environment: development

  componentTypeEnvOverrides:
    replicas: 1
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"

---
# --- ReleaseBinding: Production environment ---
apiVersion: openchoreo.dev/v1alpha1
kind: ReleaseBinding
metadata:
  name: greeting-service-production
  namespace: default
spec:
  owner:
    projectName: default
    componentName: greeting-service

  environment: production

  componentTypeEnvOverrides:
    replicas: 3
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "2000m"
        memory: "2Gi"

# =============================================================================
# RENDERED OUTPUT (what gets applied to the data plane)
# =============================================================================
#
# With the api-management trait applied, the following resources are created
# or patched:
#
# 1. Backend: kgateway static backend → WSO2 router
#    ---
#    apiVersion: gateway.kgateway.dev/v1alpha1
#    kind: Backend
#    metadata:
#      name: greeting-service-api-gw-backend
#    spec:
#      type: Static
#      static:
#        hosts:
#          - host: api-platform-default-gateway-router.openchoreo-data-plane
#            port: 8080
#
# 2. RestApi: WSO2 API Platform API definition
#    ---
#    apiVersion: gateway.api-platform.wso2.com/v1alpha1
#    kind: RestApi
#    metadata:
#      name: <release-name>
#    spec:
#      displayName: development-default-greeting-service
#      version: v1.0
#      context: /development-default-greeting-service
#      upstream:
#        main:
#          url: http://greeting-service.<namespace>:9090
#      policies: []                                    # No policies enabled
#      operations:
#        - method: GET
#          path: "/*"
#        - method: POST
#          path: "/*"
#        - method: PUT
#          path: "/*"
#        - method: PATCH
#          path: "/*"
#        - method: DELETE
#          path: "/*"
#        - method: OPTIONS
#          path: "/*"
#
# 3. Patched HTTPRoute (backendRef replaced, URL rewrite updated):
#    ---
#    apiVersion: gateway.networking.k8s.io/v1
#    kind: HTTPRoute
#    spec:
#      rules:
#        - filters:
#            - type: URLRewrite
#              urlRewrite:
#                path:
#                  type: ReplacePrefixMatch
#                  replacePrefixMatch: /development-default-greeting-service
#          backendRefs:
#            - group: gateway.kgateway.dev
#              kind: Backend
#              name: greeting-service-api-gw-backend
#
# =============================================================================
# NOTES
# =============================================================================
#
# 1. Derived Values:
#    The trait automatically derives displayName, context, version, upstream URL,
#    and operations from the component metadata and workload endpoints. No
#    user-configurable parameters are required when policies are not needed.
#
# 2. Traffic Path:
#    Client → kgateway (TLS, hostname routing) → WSO2 Router (policies) → Service → Pod
#
# 3. Context Path Pattern:
#    /<environment>-<namespace>-<componentName>
#    Example: /development-default-greeting-service
#
# 4. Enabling Policies:
#    See component.yaml for an example with jwtAuth, rateLimit, and addHeaders.